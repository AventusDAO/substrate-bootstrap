# substrate-bootstrap configuration
# Full reference: docs/CONFIG.md
# Only override what differs from defaults (see internal/config/config.go DefaultConfig).
# Default mode is "parachain". Set node.mode to "solochain" for standalone chains.
#
# RPC: Add --rpc-port, --rpc-external, --db-cache, etc. via chain.extra_args.
# Keystore: Set node.enable_keystore: true for listener/hybrid nodes (adds --keystore-path, runs keystore lifecycle).
#
# Data volumes are fixed (not configurable):
#   /data/chain-data        - chain data (--base-path target)
#   /data/chain-data/chainspec.json - downloaded chainspec (when chain.chainspec_url is set)
#   /data/relaychain-data   - relay chain snapshots (parachain mode only)
#   /data/relaychain-data/chainspec.json - downloaded relay chainspec (when relay_chain.chainspec_url is set)
#   /data/keystore          - keystore files (when enable_keystore: true)
#   /data/bootstrap_state.json - bootstrap state tracking
#
# logging:
#   level: info             # debug, info, warn, error
#   format: json            # json (default), console, or node (substrate-node style)

node:
  name: "${HOSTNAME}"
  # enable_keystore: false                 # default; true for listener/hybrid nodes
  # mode: parachain                       # "parachain" (default) or "solochain"
  # binary: /usr/bin/node                 # path to node binary

# In parachain mode, these are the parachain args (before the -- separator).
# In solochain mode, this is the main (and only) chain config.
# Chain uses --listen-addr /ip4/0.0.0.0/tcp/{port}; default 40333.
chain:
  chain_spec: /opt/chainspecs/parachain.json
  # port: 40333                          # default; override to use different port
  # chainspec_url: ""                    # when set, chain_spec is ignored; downloaded to /data/chain-data/chainspec.json
  # force_download_chainspec: false      # overwrite existing chainspec when downloading
  bootnodes:
    - /dns/parachain-boot-1.example.io/tcp/40333/p2p/12D3KooW...
    - /dns/parachain-boot-2.example.io/tcp/40333/p2p/12D3KooW...
  # blocks_pruning: archive-canonical     # default; use "archive" to keep all blocks
  # state_pruning: "256"                  # default; use "archive" to keep all state
  # snapshot_url: ""                      # rclone URL (polkadot-style) or tar archive URL
  # snapshot_chain_path: ""               # required for Polkadot-style snapshot_url (e.g. avn_staging_dev_testnet)
  # extra_args:                           # RPC args, offchain-worker, db-cache, etc.
  #   - "--rpc-port=9944"
  #   - "--rpc-external"
  #   - "--rpc-cors=all"
  #   - "--db-cache=2048"
  #   - "--offchain-worker=always"         # for listener/hybrid nodes

# Relay chain uses --port; default 30333.
relay_chain:
  chain_spec: /opt/chainspecs/polkadot.json
  # port: 30333                          # default; override to use different port
  # chainspec_url: ""                    # when set, chain_spec is ignored; downloaded to /data/relaychain-data/chainspec.json
  # force_download_chainspec: false      # overwrite existing chainspec when downloading
  bootnodes:
    - /dns/polkadot-boot.parity.io/tcp/30333/p2p/12D3KooW...
  # Uses rclone for Polkadot-style snapshots (files.txt manifest + parallel downloads).
  # For tar archives, just use a URL ending in .tar.gz, .tar.lz4, etc.
  # For Polkadot-style URLs, relay_chain_path is required (matches chain id in chainspec, e.g. paseo).
  # Base URL (no version) auto-resolves latest via latest_version.meta.txt.
  # snapshot_url: https://snapshots.polkadot.io/polkadot-paritydb-prune
  # relay_chain_path: polkadot

telemetry:
  urls:
    - "wss://telemetry.example.io/submit 0"

